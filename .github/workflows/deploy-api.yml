name: Deploy API (OCI)

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/database/src/**"
      - "packages/constants/src/**"
      - "packages/constants/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 0: 유닛 테스트 (DB 불필요) ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        # src/**/*.spec.ts만 실행 (test/e2e/** 제외)
        run: pnpm vitest run src
        working-directory: apps/api

  # ── Job 0-E2E: E2E 테스트 (실제 PostgreSQL 필요) ─────────────────────────────
  test-e2e:
    runs-on: ubuntu-latest
    name: E2E Tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bluecollar_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations (테스트 DB 스키마 생성)
        # pnpm dlx는 drizzle-orm 버전 불일치 오류를 유발하므로, 설치된 drizzle-kit을 직접 사용
        run: pnpm exec drizzle-kit migrate
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bluecollar_test

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/bluecollar_test
          JWT_SECRET: test-jwt-secret-for-ci-only-not-used-in-prod
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 30d
          EMAIL_SERVICE: mock
          SMS_PROVIDER: mock
          MEDIA_BASE_URL: http://localhost:8080
          API_URL: http://localhost:8080
          APP_URL: http://localhost:3000
          STORAGE_PATH: /tmp/uploads-test

  # ── Job 1: Docker 이미지 빌드 & GHCR Push ───────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push (ARM64)
    needs: [test, test-e2e]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OCI A1 Flex는 aarch64(ARM64) — QEMU 에뮬레이터로 크로스 빌드
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: OCI Prod 인스턴스에 배포 ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to OCI
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 설정 파일들을 서버로 전송
      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "apps/api/docker-compose.prod.yml,apps/api/promtail-config.yml,apps/api/grafana-datasources.yml"
          target: /app/
          strip_components: 2

      # SSH로 pull & restart
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_SERVICE: ${{ secrets.EMAIL_SERVICE }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MEDIA_BASE_URL: ${{ secrets.MEDIA_BASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          timeout: 180s
          envs: GITHUB_REPOSITORY,GITHUB_ACTOR,GITHUB_TOKEN,DATABASE_URL,JWT_SECRET,EMAIL_SERVICE,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,MEDIA_BASE_URL,API_URL,APP_URL,IMAP_HOST,IMAP_PORT,IMAP_USER,IMAP_PASS,GRAFANA_ADMIN_PASSWORD
          script: |
            set -e

            # GHCR 로그인
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # .env 파일 생성/갱신 (secrets 기반)
            mkdir -p /app
            cat > /app/.env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=30d
            EMAIL_SERVICE=${EMAIL_SERVICE:-mock}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            SMTP_FROM=${SMTP_FROM}
            SMS_PROVIDER=mock
            MEDIA_BASE_URL=${MEDIA_BASE_URL}
            API_URL=${API_URL}
            APP_URL=${APP_URL}
            IMAP_HOST=${IMAP_HOST:-imappro.zoho.com}
            IMAP_PORT=${IMAP_PORT:-993}
            IMAP_USER=${IMAP_USER}
            IMAP_PASS=${IMAP_PASS}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
            EOF

            # 업로드 디렉터리 준비
            mkdir -p /app/uploads

            # DB 마이그레이션 (idempotent — IF NOT EXISTS로 안전하게 재실행 가능)
            echo "Running DB migrations..."
            which psql || (sudo apt-get update -q && sudo apt-get install -y -q postgresql-client)
            psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 << 'MIGRATION'
            ALTER TABLE "users" ADD COLUMN IF NOT EXISTS "terms_agreed_at" timestamp;
            ALTER TABLE "users" ADD COLUMN IF NOT EXISTS "terms_version" varchar(20);
            CREATE TABLE IF NOT EXISTS "admin_audit_logs" (
              "id" uuid PRIMARY KEY DEFAULT gen_random_uuid() NOT NULL,
              "admin_id" uuid NOT NULL REFERENCES "users"("id"),
              "action" varchar(50) NOT NULL,
              "target_type" varchar(50) NOT NULL,
              "target_id" varchar(100) NOT NULL,
              "before" text,
              "after" text,
              "created_at" timestamp DEFAULT now() NOT NULL
            );
            CREATE INDEX IF NOT EXISTS "idx_audit_logs_admin" ON "admin_audit_logs" ("admin_id");
            CREATE INDEX IF NOT EXISTS "idx_audit_logs_target" ON "admin_audit_logs" ("target_type", "target_id");
            CREATE INDEX IF NOT EXISTS "idx_audit_logs_created_at" ON "admin_audit_logs" ("created_at");

            -- timestamp → timestamptz 변환 (멱등, 이미 timestamptz면 no-op)
            ALTER TABLE "account_linking_audit" ALTER COLUMN "timestamp" SET DATA TYPE timestamp with time zone USING "timestamp" AT TIME ZONE 'UTC';
            ALTER TABLE "auth_codes" ALTER COLUMN "expires_at" SET DATA TYPE timestamp with time zone USING "expires_at" AT TIME ZONE 'UTC';
            ALTER TABLE "auth_codes" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "buildings" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "buildings" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "business_documents" ALTER COLUMN "submitted_at" SET DATA TYPE timestamp with time zone USING "submitted_at" AT TIME ZONE 'UTC';
            ALTER TABLE "business_documents" ALTER COLUMN "validated_at" SET DATA TYPE timestamp with time zone USING "validated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "business_documents" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "disposable_email_blacklist" ALTER COLUMN "added_at" SET DATA TYPE timestamp with time zone USING "added_at" AT TIME ZONE 'UTC';
            ALTER TABLE "email_verification_codes" ALTER COLUMN "used_at" SET DATA TYPE timestamp with time zone USING "used_at" AT TIME ZONE 'UTC';
            ALTER TABLE "email_verification_codes" ALTER COLUMN "expires_at" SET DATA TYPE timestamp with time zone USING "expires_at" AT TIME ZONE 'UTC';
            ALTER TABLE "email_verification_codes" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "manual_reviews" ALTER COLUMN "reviewed_at" SET DATA TYPE timestamp with time zone USING "reviewed_at" AT TIME ZONE 'UTC';
            ALTER TABLE "materials" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "materials" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_details" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_details" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_media" ALTER COLUMN "taken_at" SET DATA TYPE timestamp with time zone USING "taken_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_media" ALTER COLUMN "uploaded_at" SET DATA TYPE timestamp with time zone USING "uploaded_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_media" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_rooms" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolio_tags" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolios" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "portfolios" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "refresh_tokens" ALTER COLUMN "expires_at" SET DATA TYPE timestamp with time zone USING "expires_at" AT TIME ZONE 'UTC';
            ALTER TABLE "refresh_tokens" ALTER COLUMN "revoked_at" SET DATA TYPE timestamp with time zone USING "revoked_at" AT TIME ZONE 'UTC';
            ALTER TABLE "refresh_tokens" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "email_verified_at" SET DATA TYPE timestamp with time zone USING "email_verified_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "phone_verified_at" SET DATA TYPE timestamp with time zone USING "phone_verified_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "terms_agreed_at" SET DATA TYPE timestamp with time zone USING "terms_agreed_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "users" ALTER COLUMN "deleted_at" SET DATA TYPE timestamp with time zone USING "deleted_at" AT TIME ZONE 'UTC';
            ALTER TABLE "worker_profiles" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            ALTER TABLE "worker_profiles" ALTER COLUMN "updated_at" SET DATA TYPE timestamp with time zone USING "updated_at" AT TIME ZONE 'UTC';
            ALTER TABLE "admin_audit_logs" ALTER COLUMN "created_at" SET DATA TYPE timestamp with time zone USING "created_at" AT TIME ZONE 'UTC';
            MIGRATION
            echo "✅ DB migrations complete"

            # 최신 이미지 pull 후 재시작
            cd /app
            export GITHUB_REPOSITORY="$GITHUB_REPOSITORY"
            # pull 직전 재로그인 (토큰 세션 갱신)
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 헬스체크 (최대 60초 대기)
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Deployment successful — /health OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check timed out"
                docker compose -f docker-compose.prod.yml logs --tail=50
                exit 1
              fi
              echo "  attempt $i/12, retrying in 5s..."
              sleep 5
            done

            # 오래된 이미지 정리
            docker image prune -f

      - name: Notify Slack (배포 성공)
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-templated: true
          payload: >-
            {
              "attachments": [
                {
                  "fallback": "BlueCollar API Deploy Success",
                  "color": "#2EB67D",
                  "pretext": ":hammer: *BlueCollar API:* 배포 성공",
                  "title": "Deployment Complete: bluecollar-cv API",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "text": "Successfully deployed to production server.",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (배포 실패)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-templated: true
          payload: >-
            {
              "attachments": [
                {
                  "fallback": "BlueCollar API Deploy Failed",
                  "color": "#E01E5A",
                  "pretext": ":rotating_light: *BlueCollar API:* 배포 실패",
                  "title": "Deployment Failed: bluecollar-cv API",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "text": "배포 중 오류가 발생했습니다. 로그를 확인해주세요.",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true }
                  ]
                }
              ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ERROR }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
