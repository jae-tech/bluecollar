name: Deploy API (OCI)

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/database/src/**"
      - "packages/constants/src/**"
      - "packages/constants/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # в”Җв”Җ Job 1: Docker мқҙлҜём§Җ л№Ңл“ң & GHCR Push в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push (ARM64)
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OCI A1 FlexлҠ” aarch64(ARM64) вҖ” QEMU м—җл®¬л Ҳмқҙн„°лЎң нҒ¬лЎңмҠӨ л№Ңл“ң
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # в”Җв”Җ Job 2: OCI Prod мқёмҠӨн„ҙмҠӨм—җ л°°нҸ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to OCI
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # docker-compose.prod.ymlмқ„ м„ңлІ„лЎң м „мҶЎ
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "apps/api/docker-compose.prod.yml"
          target: /app/
          strip_components: 2

      # SSHлЎң pull & restart
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_SERVICE: ${{ secrets.EMAIL_SERVICE }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MEDIA_BASE_URL: ${{ secrets.MEDIA_BASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          APP_URL: ${{ secrets.APP_URL }}
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          timeout: 180s
          envs: GITHUB_REPOSITORY,GITHUB_ACTOR,GITHUB_TOKEN,DATABASE_URL,JWT_SECRET,EMAIL_SERVICE,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,MEDIA_BASE_URL,API_URL,APP_URL
          script: |
            set -e

            # GHCR лЎңк·ёмқё
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # .env нҢҢмқј мғқм„ұ/к°ұмӢ  (secrets кё°л°ҳ)
            mkdir -p /app
            cat > /app/.env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=30d
            EMAIL_SERVICE=${EMAIL_SERVICE:-mock}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            SMTP_FROM=${SMTP_FROM}
            SMS_PROVIDER=mock
            MEDIA_BASE_URL=${MEDIA_BASE_URL}
            API_URL=${API_URL}
            APP_URL=${APP_URL}
            EOF

            # м—…лЎңл“ң л””л үн„°лҰ¬ мӨҖл№„
            mkdir -p /app/uploads

            # мөңмӢ  мқҙлҜём§Җ pull нӣ„ мһ¬мӢңмһ‘
            cd /app
            export GITHUB_REPOSITORY="$GITHUB_REPOSITORY"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # н—¬мҠӨмІҙнҒ¬ (мөңлҢҖ 60мҙҲ лҢҖкё°)
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "вң… Deployment successful вҖ” /health OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "вқҢ Health check timed out"
                docker compose -f docker-compose.prod.yml logs --tail=50
                exit 1
              fi
              echo "  attempt $i/12, retrying in 5s..."
              sleep 5
            done

            # мҳӨлһҳлҗң мқҙлҜём§Җ м •лҰ¬
            docker image prune -f

      - name: Notify Slack (л°°нҸ¬ м„ұкіө)
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "вң… *API л°°нҸ¬ м„ұкіө*\nвҖў м»Өл°Ӣ: `${{ github.sha }}` by ${{ github.actor }}\nвҖў <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|мӣҢнҒ¬н”ҢлЎңмҡ° ліҙкё°>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (л°°нҸ¬ мӢӨнҢЁ)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "вқҢ *API л°°нҸ¬ мӢӨнҢЁ*\nвҖў м»Өл°Ӣ: `${{ github.sha }}` by ${{ github.actor }}\nвҖў <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|лЎңк·ё нҷ•мқё>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ERROR }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
