name: Deploy API (OCI)

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/database/src/**"
      - "packages/constants/src/**"
      - "packages/constants/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Docker 이미지 빌드 & GHCR Push ───────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push (ARM64)
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OCI A1 Flex는 aarch64(ARM64) — QEMU 에뮬레이터로 크로스 빌드
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: OCI Prod 인스턴스에 배포 ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to OCI
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # docker-compose.prod.yml을 서버로 전송
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: "apps/api/docker-compose.prod.yml"
          target: /app/
          strip_components: 2

      # SSH로 pull & restart
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_SERVICE: ${{ secrets.EMAIL_SERVICE }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MEDIA_BASE_URL: ${{ secrets.MEDIA_BASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          APP_URL: ${{ secrets.APP_URL }}
        with:
          host: ${{ secrets.OCI_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          timeout: 180s
          envs: GITHUB_REPOSITORY,GITHUB_ACTOR,GITHUB_TOKEN,DATABASE_URL,JWT_SECRET,EMAIL_SERVICE,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,MEDIA_BASE_URL,API_URL,APP_URL
          script: |
            set -e

            # GHCR 로그인
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # .env 파일 생성/갱신 (secrets 기반)
            mkdir -p /app
            cat > /app/.env << EOF
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=30d
            EMAIL_SERVICE=${EMAIL_SERVICE:-mock}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            SMTP_FROM=${SMTP_FROM}
            SMS_PROVIDER=mock
            MEDIA_BASE_URL=${MEDIA_BASE_URL}
            API_URL=${API_URL}
            APP_URL=${APP_URL}
            EOF

            # 업로드 디렉터리 준비
            mkdir -p /app/uploads

            # DB 마이그레이션 (idempotent — IF NOT EXISTS로 안전하게 재실행 가능)
            echo "Running DB migrations..."
            which psql || (sudo apt-get update -q && sudo apt-get install -y -q postgresql-client)
            psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 << 'MIGRATION'
            ALTER TABLE "users" ADD COLUMN IF NOT EXISTS "terms_agreed_at" timestamp;
            ALTER TABLE "users" ADD COLUMN IF NOT EXISTS "terms_version" varchar(20);
            MIGRATION
            echo "✅ DB migrations complete"

            # 최신 이미지 pull 후 재시작
            cd /app
            export GITHUB_REPOSITORY="$GITHUB_REPOSITORY"
            # pull 직전 재로그인 (토큰 세션 갱신)
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 헬스체크 (최대 60초 대기)
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Deployment successful — /health OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check timed out"
                docker compose -f docker-compose.prod.yml logs --tail=50
                exit 1
              fi
              echo "  attempt $i/12, retrying in 5s..."
              sleep 5
            done

            # 오래된 이미지 정리
            docker image prune -f

      - name: Notify Slack (배포 성공)
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-templated: true
          payload: >-
            {
              "attachments": [
                {
                  "fallback": "BlueCollar API Deploy Success",
                  "color": "#2EB67D",
                  "pretext": ":hammer: *BlueCollar API:* 배포 성공",
                  "title": "Deployment Complete: bluecollar-cv API",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "text": "Successfully deployed to production server.",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (배포 실패)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-templated: true
          payload: >-
            {
              "attachments": [
                {
                  "fallback": "BlueCollar API Deploy Failed",
                  "color": "#E01E5A",
                  "pretext": ":rotating_light: *BlueCollar API:* 배포 실패",
                  "title": "Deployment Failed: bluecollar-cv API",
                  "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "text": "배포 중 오류가 발생했습니다. 로그를 확인해주세요.",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true }
                  ]
                }
              ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ERROR }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
