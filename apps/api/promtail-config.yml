server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # 컨테이너명을 container 레이블로
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # 이미지명을 image 레이블로
      - source_labels: [__meta_docker_container_image]
        target_label: image

    # bluecollar-api는 JSON 로그 파싱
    pipeline_stages:
      - match:
          selector: '{container="bluecollar-api"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  context: context
                  email: email
                  error: error
                  statusCode: statusCode
                  path: path
            - labels:
                level:
                context:
            - output:
                source: msg
