<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="180" height="180" rx="38" fill="#292524"/>

  <!-- 세로선 — 살짝 오른쪽으로 기울어짐 -->
  <line
    x1="58" y1="42"
    x2="62" y2="138"
    stroke="#FAFAF9"
    stroke-width="14"
    stroke-linecap="round"
  />

  <!-- 위 배불뚝이 — 살짝 작고 오른쪽 끝이 완전히 닫히지 않음 -->
  <path
    d="M 60,42 C 60,42 118,38 120,68 C 122,88 65,90 63,90"
    fill="none"
    stroke="#FAFAF9"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 아래 배불뚝이 — 위보다 크고, 시작점이 살짝 내려옴, 끝이 약간 올라옴 -->
  <path
    d="M 60,90 C 60,90 126,86 128,118 C 130,142 62,140 59,138"
    fill="none"
    stroke="#FAFAF9"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
