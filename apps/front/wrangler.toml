name = "bluecollar"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"

[build]
# @repo/constants dist 빌드 후 프론트 빌드 (monorepo root 기준 실행)
command = "pnpm --filter @repo/constants build && pnpm --filter bluecollar-front build:cf"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# 정적 자산 (Next.js 빌드 결과물)
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Worker 자기 참조 (OpenNext 내부 라우팅용)
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "bluecollar"

# 환경변수는 Cloudflare Dashboard 또는 .dev.vars 에서 관리
# [vars]
# NEXT_PUBLIC_API_URL = "https://api.bluecollarcv.kr"
